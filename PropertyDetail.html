<>
  <meta charSet="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Property — UKM Students off School Rented System</title>
  <style
    dangerouslySetInnerHTML={{
      __html:
        '\n  :root{\n    --bg:#f3f6f9;\n    --card-bg: rgba(255,255,255,0.94);\n    --accent:#1e88ff; --accent-2:#0b3d91;\n    --ink:#041126; --muted:#6b7380;\n    --radius:14px; --shadow:0 18px 40px rgba(7,12,25,0.12);\n    --ease:cubic-bezier(.2,.9,.2,1);\n    --success:#17c964; --danger:#ff6257;\n  }\n  html,body{height:100%;margin:0;font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,Arial;background:linear-gradient(180deg,#eef3fb,#fff);color:var(--ink);-webkit-font-smoothing:antialiased}\n  .page{min-height:100vh;padding:18px;box-sizing:border-box;opacity:0;transform:translateY(8px);animation:pageIn 420ms var(--ease) forwards}\n  @keyframes pageIn{to{opacity:1;transform:none}}\n\n  header.appbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-radius:calc(var(--radius)+6px);background:linear-gradient(180deg,rgba(255,255,255,0.76),rgba(255,255,255,0.6));box-shadow:var(--shadow);backdrop-filter:blur(8px)}\n  .brand{display:flex;gap:12px;align-items:center}\n  .logo{width:52px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:white;font-weight:700}\n  nav.actions{display:flex;gap:8px;align-items:center}\n  .btn{padding:8px 12px;border-radius:10px;border:0;cursor:pointer;font-size:14px}\n  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 10px 28px rgba(11,61,145,0.08)}\n  .btn-ghost{background:transparent;border:1px solid rgba(10,16,28,0.06);color:var(--accent-2)}\n  .tiny{font-size:13px;color:var(--muted)}\n\n  main.layout{display:grid;grid-template-columns:1fr 360px;gap:18px;margin-top:14px}\n  @media(max-width:980px){ main.layout{grid-template-columns:1fr} }\n\n  .card{background:var(--card-bg);border-radius:12px;padding:14px;box-shadow:0 8px 26px rgba(8,12,24,0.06);backdrop-filter:blur(6px)}\n  .carousel{position:relative;border-radius:12px;overflow:hidden;height:360px;background:#e9eef7}\n  .carousel img{width:100%;height:100%;object-fit:cover;display:block}\n  .carousel .dots{position:absolute;left:50%;transform:translateX(-50%);bottom:12px;display:flex;gap:8px}\n  .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.6);box-shadow:0 4px 10px rgba(7,12,25,0.12);cursor:pointer}\n  .dot.active{background:var(--accent)}\n\n  .fav-btn{position:absolute;right:12px;top:12px;border-radius:10px;padding:8px;background:rgba(255,255,255,0.8);cursor:pointer;box-shadow:0 8px 20px rgba(7,12,25,0.06)}\n  .share-btn{position:absolute;left:12px;top:12px;border-radius:10px;padding:8px;background:rgba(255,255,255,0.8);cursor:pointer;box-shadow:0 8px 20px rgba(7,12,25,0.06)}\n\n  .meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}\n  .title{font-weight:800;font-size:20px}\n  .price{font-weight:800;color:var(--accent-2)}\n  .tags{display:flex;gap:8px;align-items:center}\n\n  .section{margin-top:12px}\n  .features{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}\n  .feature{padding:8px 10px;border-radius:10px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(10,16,28,0.03);font-size:13px;color:var(--muted)}\n\n  /* host card */\n  .host-card{display:flex;gap:12px;align-items:center}\n  .host-avatar{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:800}\n  .host-info{flex:1}\n  .host-actions{display:flex;gap:8px;align-items:center}\n\n  /* responsive image gallery thumbnails */\n  .thumbs{display:flex;gap:8px;margin-top:8px;overflow:auto}\n  .thumbs img{width:84px;height:64px;object-fit:cover;border-radius:8px;border:1px solid rgba(10,16,28,0.03);cursor:pointer}\n\n  .notes{font-size:13px;color:var(--muted);margin-top:8px}\n\n  /* modal */\n  .modal-backdrop{position:fixed;inset:0;background:rgba(6,10,20,0.36);display:none;align-items:center;justify-content:center;z-index:90}\n  .modal{width:min(720px,94vw);background:white;border-radius:12px;padding:16px;box-shadow:0 30px 80px rgba(2,6,23,0.28)}\n\n  .__toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:100;padding:8px 14px;border-radius:10px;color:#fff;box-shadow:0 10px 30px rgba(14,54,120,0.12)}\n'
    }}
  />
  <div className="page" role="document">
    <header className="appbar" role="banner">
      <div className="brand">
        <div className="logo">UKM</div>
        <div>
          <div style={{ fontWeight: 700 }}>
            UKM Students off School Rented System
          </div>
          <div className="tiny">Property details</div>
        </div>
      </div>
      <nav className="actions" role="navigation">
        <a href="index.html" className="btn btn-ghost">
          Home
        </a>
        <a href="favorites.html" className="btn btn-ghost">
          Favourites
        </a>
        <a href="host-dashboard.html" className="btn btn-ghost">
          Dashboard
        </a>
        <a href="login.html" className="btn btn-ghost">
          Log in
        </a>
      </nav>
    </header>
    <main className="layout" role="main">
      {/* left: main content */}
      <section className="card" aria-labelledby="propTitle">
        <div className="carousel" id="carousel">
          <button className="share-btn" id="shareBtn" title="Share">
            🔗
          </button>
          <button className="fav-btn" id="favBtn" title="Add to favourites">
            ♡
          </button>
          {/* images injected by JS */}
          <div className="dots" id="dots" />
        </div>
        <div className="meta-row">
          <div>
            <div className="title" id="pTitle">
              Studio near UKM - 5 min
            </div>
            <div className="tiny" id="pArea">
              Bangi · Taman UKM
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div className="price" id="pPrice">
              RM 450 / month
            </div>
            <div className="tiny">Deposit: RM 450</div>
          </div>
        </div>
        <div className="section">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Overview</div>
            <div className="tags">
              <div className="feature">1 Bed</div>
              <div className="feature">Wi-Fi</div>
              <div className="feature">Furnished</div>
            </div>
          </div>
          <div className="notes" id="pDesc">
            Cozy studio suitable for UKM students. Close to campus and public
            transport. Shared kitchen. No pets allowed.
          </div>
        </div>
        <div className="section">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Amenities</div>
            <div className="tiny">Listed features</div>
          </div>
          <div className="features" id="pFeatures">
            {/* filled by JS */}
          </div>
        </div>
        <div className="section">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Description &amp; Rules</div>
            <div className="tiny">House rules</div>
          </div>
          <div className="notes" id="pRules">
            Quiet hours after 11 PM. No smoking. Keep common areas clean. Guests
            allowed with notice.
          </div>
        </div>
        <div className="section">
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <a
              id="applyBtn"
              href="student-apply.html"
              className="btn btn-primary"
            >
              Apply now
            </a>
            <button id="messageHost" className="btn btn-ghost">
              Message host
            </button>
            <button id="reportBtn" className="btn btn-ghost">
              Report
            </button>
            <div style={{ marginLeft: "auto" }} className="tiny">
              Hosted by <strong id="hostType">Agent</strong>
            </div>
          </div>
        </div>
        <div className="section">
          <div style={{ fontWeight: 700 }}>Location</div>
          <div className="tiny" id="currentAddress" style={{ marginTop: 6 }}>
            Near UKM Campus, Bangi (detected)
          </div>
          <div className="notes">
            System will prioritize nearby results on the home page — small
            textual address only (no map).
          </div>
        </div>
        <div className="section">
          <div style={{ fontWeight: 700 }}>Images</div>
          <div className="thumbs" id="thumbs" />
        </div>
      </section>
      {/* right: host / details */}
      <aside className="card" aria-labelledby="hostTitle">
        <h3 id="hostTitle">Host information</h3>
        <div style={{ marginTop: 8 }} className="host-card">
          <div className="host-avatar" id="hostAvatar">
            AG
          </div>
          <div className="host-info">
            <div style={{ fontWeight: 800 }} id="hostName">
              BlueHome Agency
            </div>
            <div className="tiny" id="hostContact">
              Agent · bluehome@example.com
            </div>
            <div className="tiny" id="hostSince">
              Member since 2024
            </div>
          </div>
        </div>
        <div style={{ marginTop: 12 }} className="host-actions">
          <a
            id="hostDashboardLink"
            href="agent-dashboard.html"
            className="btn btn-ghost"
          >
            Agent Dashboard
          </a>
          <a id="viewOtherProps" href="index.html" className="btn btn-ghost">
            View more by host
          </a>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontWeight: 700 }}>Policies</div>
          <div className="tiny" style={{ marginTop: 6 }}>
            Security deposit and tenancy rules are provided in the contract. See{" "}
            <a href="contract-viewer.html">Contract</a> for templates.
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontWeight: 700 }}>Quick stats</div>
          <div className="tiny" style={{ marginTop: 6 }}>
            Views: <strong id="viewsCount">124</strong> · Applications:{" "}
            <strong id="appsCount">3</strong>
          </div>
        </div>
        <div style={{ marginTop: 12, color: "var(--muted)", fontSize: 13 }}>
          <div>
            Share:{" "}
            <button id="shareLink" className="btn btn-ghost">
              Copy link
            </button>
          </div>
        </div>
      </aside>
    </main>
    <footer
      style={{
        textAlign: "center",
        color: "var(--muted)",
        fontSize: 13,
        padding: "12px 0",
        marginTop: 12
      }}
    >
      © 2025 UKM Students off School Rented System
    </footer>
  </div>
  {/* report modal */}
  <div
    className="modal-backdrop"
    id="modalBackdrop"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
  >
    <div className="modal">
      <h3>Report property</h3>
      <p>
        Please briefly explain the issue. The report will be sent to platform
        admin for review.
      </p>
      <textarea
        id="reportText"
        style={{
          width: "100%",
          height: 120,
          padding: 8,
          borderRadius: 8,
          border: "1px solid rgba(10,16,28,0.06)"
        }}
        defaultValue={""}
      />
      <div
        style={{
          display: "flex",
          justifyContent: "flex-end",
          gap: 8,
          marginTop: 12
        }}
      >
        <button id="cancelReport" className="btn btn-ghost">
          Cancel
        </button>
        <button id="sendReport" className="btn btn-primary">
          Send report
        </button>
      </div>
    </div>
  </div>
</>
