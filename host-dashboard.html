<>
  <meta charSet="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Host Dashboard — UKM Students off School Rented System</title>
  <style
    dangerouslySetInnerHTML={{
      __html:
        '\n  :root{\n    --bg:#f6f8fb;\n    --card-bg: rgba(255,255,255,0.9);\n    --accent: #1e88ff;\n    --accent-2: #0b3d91;\n    --ink: #071028;\n    --muted: #6a7480;\n    --radius:14px;\n    --shadow-lg: 0 18px 40px rgba(7,12,25,0.12);\n    --ease: cubic-bezier(.2,.9,.2,1);\n    --success: #17c964;\n    --danger: #ff6257;\n  }\n\n  html,body{height:100%;margin:0;font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial;color:var(--ink);background:linear-gradient(180deg,#eef3fb,#fff);-webkit-font-smoothing:antialiased}\n  .page{min-height:100vh;display:flex;flex-direction:column;gap:18px;padding:18px;box-sizing:border-box;opacity:0;transform:translateY(8px);animation:pageIn 420ms var(--ease) forwards}\n  @keyframes pageIn { to { opacity:1; transform:none } }\n\n  header.appbar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(180deg,rgba(255,255,255,0.75), rgba(255,255,255,0.6));backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:calc(var(--radius)+6px);padding:12px 16px;box-shadow:var(--shadow-lg)}\n  .brand{display:flex;gap:12px;align-items:center}\n  .logo{width:52px;height:44px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;font-weight:700;box-shadow:0 8px 22px rgba(14,54,120,0.12)}\n  .title{font-weight:700;font-size:15px}\n  .subtitle{font-size:12px;color:var(--muted);margin-top:2px}\n  nav.actions{display:flex;gap:8px;align-items:center}\n  nav.actions a, .btn {font-size:14px;padding:8px 12px;border-radius:10px;border:0;text-decoration:none;cursor:pointer;transition:transform 160ms var(--ease), box-shadow 160ms var(--ease)}\n  .btn:hover{transform:translateY(-2px)}\n  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white;box-shadow:0 10px 28px rgba(14,54,120,0.12)}\n  .btn-ghost{background:transparent;border:1px solid rgba(12,20,40,0.06);color:var(--accent-2)}\n  .guest-pill{background:linear-gradient(90deg, rgba(11,61,145,0.08), rgba(30,136,255,0.06));color:var(--accent-2);font-weight:600}\n\n  .dashboard{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}\n  @media(max-width:1000px){ .dashboard{grid-template-columns:1fr} }\n\n  /* summary cards */\n  .cards{display:flex;gap:12px;flex-wrap:wrap}\n  .stat-card{flex:1 1 180px;background:linear-gradient(180deg,rgba(255,255,255,0.95),#fff);border-radius:12px;padding:14px;box-shadow:0 8px 26px rgba(8,12,24,0.06);display:flex;flex-direction:column;gap:8px;min-width:160px}\n  .stat-card .num{font-weight:800;font-size:20px}\n  .stat-card .label{color:var(--muted);font-size:13px}\n\n  /* main panels */\n  .panel{background:var(--card-bg);border-radius:12px;padding:14px;box-shadow:0 8px 26px rgba(8,12,24,0.06)}\n  .panel h3{margin:0 0 10px 0}\n\n  /* listings table/cards */\n  .listings{display:flex;flex-direction:column;gap:12px}\n  .listing-card{display:flex;gap:12px;align-items:center;padding:12px;border-radius:12px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(10,16,28,0.02);box-shadow:0 6px 20px rgba(8,12,24,0.04);transition:transform 260ms var(--ease),box-shadow 260ms var(--ease);opacity:0;transform:translateY(8px)}\n  .listing-card.show{opacity:1;transform:none}\n  .thumb{width:120px;height:80px;border-radius:8px;background-size:cover;background-position:center;flex-shrink:0}\n  .l-info{flex:1;display:flex;flex-direction:column}\n  .l-title{font-weight:800}\n  .l-meta{color:var(--muted);font-size:13px}\n  .l-stats{display:flex;gap:8px;align-items:center;margin-top:8px}\n  .badge{padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px;background:rgba(11,61,145,0.06);color:var(--accent-2)}\n  .badge.published{background:linear-gradient(90deg, rgba(30,136,255,0.08), rgba(30,136,255,0.04));color:var(--accent-2)}\n  .actions{display:flex;gap:8px;align-items:center}\n\n  .tiny{font-size:13px;color:var(--muted)}\n\n  /* application list */\n  .apps{display:flex;flex-direction:column;gap:8px}\n  .app-card{display:flex;justify-content:space-between;gap:8px;padding:8px;border-radius:8px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(10,16,28,0.02)}\n  .app-card .left{display:flex;gap:8px;align-items:center}\n  .avatar-sm{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:700}\n\n  /* messages */\n  .msg-list{display:flex;flex-direction:column;gap:8px}\n  .msg-item{padding:10px;border-radius:8px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(10,16,28,0.02)}\n\n  /* modal */\n  .modal-backdrop{position:fixed;inset:0;background:rgba(6,10,20,0.36);display:none;align-items:center;justify-content:center;z-index:80}\n  .modal{width:min(760px,94vw);background:white;border-radius:12px;padding:16px;box-shadow:0 30px 80px rgba(2,6,23,0.28)}\n\n  /* toast */\n  .__toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:90;padding:8px 14px;border-radius:10px;color:#fff;box-shadow:0 10px 30px rgba(14,54,120,0.12)}\n\n  /* subtle hover */\n  .listing-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(8,12,24,0.08)}\n'
    }}
  />
  <div className="page" role="document">
    <header className="appbar" role="banner">
      <div className="brand">
        <div className="logo">UKM</div>
        <div>
          <div className="title">UKM Students off School Rented System</div>
          <div className="subtitle">Host Dashboard</div>
        </div>
      </div>
      <nav className="actions" role="navigation">
        <a href="index.html" className="btn btn-ghost">
          Home
        </a>
        <a href="create-listing.html" className="btn btn-primary">
          Create Listing
        </a>
        <a href="favorites.html" className="btn btn-ghost">
          Favourites
        </a>
        <a href="login.html" className="btn btn-ghost">
          Log in
        </a>
      </nav>
    </header>
    <main className="dashboard" role="main">
      <section style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {/* summary */}
        <div className="panel">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div>
              <h3 style={{ margin: 0 }}>Overview</h3>
              <div className="tiny" style={{ marginTop: 6 }}>
                Quick metrics for your host account
              </div>
            </div>
            <div className="tiny" id="lastSync">
              Last sync: just now
            </div>
          </div>
          <div style={{ height: 12 }} />
          <div className="cards" id="statCards" aria-live="polite">
            <div className="stat-card" aria-hidden="false">
              <div className="num" id="statListings">
                0
              </div>
              <div className="label">Active listings</div>
            </div>
            <div className="stat-card">
              <div className="num" id="statDrafts">
                0
              </div>
              <div className="label">Drafts</div>
            </div>
            <div className="stat-card">
              <div className="num" id="statApps">
                0
              </div>
              <div className="label">New applications</div>
            </div>
            <div className="stat-card">
              <div className="num" id="statMsgs">
                0
              </div>
              <div className="label">Unread messages</div>
            </div>
          </div>
        </div>
        {/* listings */}
        <div className="panel">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <h3 style={{ margin: 0 }}>My listings</h3>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input
                id="searchList"
                type="search"
                placeholder="Search title or area"
                style={{
                  padding: 8,
                  borderRadius: 10,
                  border: "1px solid rgba(10,16,28,0.06)"
                }}
              />
              <a href="create-listing.html" className="btn btn-primary">
                New listing
              </a>
            </div>
          </div>
          <div style={{ marginTop: 12 }} id="listingsWrap">
            <div className="listings" id="listings" />
          </div>
        </div>
        {/* applications */}
        <div className="panel">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <h3 style={{ margin: 0 }}>Applications</h3>
            <div className="tiny">Manage requests from potential tenants</div>
          </div>
          <div style={{ marginTop: 12 }} id="appsWrap">
            <div className="apps" id="applications" />
          </div>
        </div>
      </section>
      {/* right sidebar */}
      <aside>
        <div className="panel" style={{ marginBottom: 12 }}>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Account</div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>
              Host tools
            </div>
          </div>
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <a href="create-listing.html" className="btn btn-ghost">
                Create
              </a>
              <a href="favorites.html" className="btn btn-ghost">
                Favourites
              </a>
            </div>
          </div>
          <div style={{ marginTop: 12 }}>
            <div style={{ fontWeight: 700 }}>Your current address</div>
            <div
              id="addrText"
              className="tiny"
              style={{ marginTop: 8, color: "var(--muted)" }}
            >
              Detecting address…
            </div>
            <div style={{ marginTop: 8 }}>
              <button id="locBtn" className="btn btn-ghost">
                Refresh location
              </button>
            </div>
          </div>
        </div>
        <div className="panel" style={{ marginBottom: 12 }}>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Messages</div>
            <div className="tiny">Recent</div>
          </div>
          <div style={{ marginTop: 10 }} id="messages">
            <div className="msg-list" id="msgList" />
          </div>
        </div>
        <div className="panel">
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}
          >
            <div style={{ fontWeight: 700 }}>Help &amp; resources</div>
            <div className="tiny">Docs</div>
          </div>
          <ul style={{ marginTop: 10, color: "#24303b" }}>
            <li>
              <a href="terms.html">Terms &amp; conditions</a>
            </li>
            <li>
              <a href="privacy.html">Privacy policy</a>
            </li>
            <li>
              <a href="help.html">Host guide (placeholder)</a>
            </li>
          </ul>
        </div>
      </aside>
    </main>
    <footer
      style={{
        textAlign: "center",
        color: "var(--muted)",
        fontSize: 13,
        padding: "12px 0",
        marginTop: 8
      }}
    >
      © 2025 UKM Students off School Rented System
    </footer>
  </div>
  {/* modal: confirm delete, view application */}
  <div
    className="modal-backdrop"
    id="modalBackdrop"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
  >
    <div className="modal" id="modal" role="document">
      <div id="modalContent">{/* dynamic */}</div>
      <div
        style={{
          display: "flex",
          justifyContent: "flex-end",
          gap: 8,
          marginTop: 12
        }}
      >
        <button id="modalCancel" className="btn btn-ghost">
          Close
        </button>
        <button
          id="modalPrimary"
          className="btn btn-primary"
          style={{ display: "none" }}
        >
          Primary
        </button>
      </div>
    </div>
  </div>
</>
